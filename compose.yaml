services:
  db:
    image: postgres:16.13-alpine
    container_name: db
    restart: always
    environment:
      POSTGRES_DB: driving_exam
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init/:/docker-entrypoint-initdb.d/

volumes:
  pgdata: